version: '3.8'

# ============================================================
# Docker Compose - Infraestructura TI CORPAMAG
# Descripción: Orquestación de servicios institucionales
# Autor: Juan Camilo Lopez
# ============================================================

networks:
  # Red interna compartida entre todos los contenedores
  corpamag-net:
    driver: bridge

volumes:
  # Volumen persistente para datos de PostgreSQL
  db_data:
  # Volumen persistente para archivos compartidos Samba
  file_data:

services:

  # ------------------------------------------------------------
  # SERVICIO 1: Servidor Web - Nginx
  # Función: Portal institucional CORPAMAG
  # Puerto: 80 (HTTP)
  # ------------------------------------------------------------
  web-server:
    build: ./docker/web
    container_name: corpamag-web
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - corpamag-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ------------------------------------------------------------
  # SERVICIO 2: Base de Datos - PostgreSQL 15
  # Función: Almacena licencias ambientales y expedientes
  # Puerto: 5432 (solo red interna, no expuesto al host)
  # ------------------------------------------------------------
  db-server:
    build: ./docker/database
    container_name: corpamag-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: corpamag_db
      POSTGRES_USER: corpamag_admin
      POSTGRES_PASSWORD: Corpamag2024!
    volumes:
      # Datos persistentes fuera del contenedor
      - db_data:/var/lib/postgresql/data
    networks:
      - corpamag-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corpamag_admin -d corpamag_db"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ------------------------------------------------------------
  # SERVICIO 3: Servidor de Archivos - Samba
  # Función: Repositorio de documentos internos CORPAMAG
  # Puerto: 445 (SMB)
  # ------------------------------------------------------------
  file-server:
    build: ./docker/fileserver
    container_name: corpamag-files
    restart: unless-stopped
    volumes:
      - file_data:/srv/samba/documentos
    networks:
      - corpamag-net
    ports:
      - "445:445"

  # ------------------------------------------------------------
  # SERVICIO 4: Servidor NTP - Chrony
  # Función: Sincronización horaria para logs y auditorías
  # Puerto: 123/UDP
  # ------------------------------------------------------------
  ntp-server:
    build: ./docker/ntp
    container_name: corpamag-ntp
    restart: unless-stopped
    cap_add:
      # Permiso necesario para modificar el reloj del sistema
      - SYS_TIME
    networks:
      - corpamag-net
    ports:
      - "123:123/udp"

  # ------------------------------------------------------------
  # SERVICIO 5: Acceso Remoto - OpenSSH
  # Función: Acceso seguro para administradores y funcionarios
  # Puerto: 2222 (SSH no estándar por seguridad)
  # ------------------------------------------------------------
  ssh-server:
    image: linuxserver/openssh-server:latest
    container_name: corpamag-ssh
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - PASSWORD_ACCESS=true
      - USER_PASSWORD=Admin2024!
      - USER_NAME=corpamag_admin
    ports:
      - "2222:2222"
    networks:
      - corpamag-net
