# ============================================================
# Configuración: nginx-lb.conf
# Descripción: Balanceador de carga CORPAMAG
# Distribuye tráfico entre dos instancias web
# ============================================================

events {
    worker_connections 1024;
}

http {

    # Definición del grupo de servidores backend
    upstream corpamag_backend {
        # Algoritmo: Round-Robin (por defecto)
        # Distribuye peticiones alternando entre servidores
        server corpamag-web:80;
        server corpamag-web2:80;

        # Keepalive para mejor rendimiento
        keepalive 32;
    }

    server {
        listen 80;
        server_name corpamag.local;

        # Logs del balanceador
        access_log /var/log/nginx/lb_access.log;
        error_log  /var/log/nginx/lb_error.log;

        location / {
            proxy_pass http://corpamag_backend;

            # Headers para identificar origen
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    10s;
            proxy_read_timeout    10s;
        }

        # Endpoint de estado del balanceador
        location /lb-status {
            access_log off;
            return 200 "Balanceador CORPAMAG activo\n";
            add_header Content-Type text/plain;
        }
    }
}
