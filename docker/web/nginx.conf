events {
    worker_connections 1024;
}

http {
    server_tokens off;

    server {
        listen 80;
        server_name corpamag.local;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log;
    }
}
