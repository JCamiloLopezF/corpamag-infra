# ============================================================
# Configuración Prometheus - CORPAMAG
# Recolecta métricas de todos los servicios
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Métricas del propio Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Métricas del sistema host (CPU, RAM, disco)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['corpamag-node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'CORPAMAG-Server'
